<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>starts</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header h1 {
      font-size: 1.2rem;
      padding: 1rem 0;
    }

    .tabs {
      display: flex;
      gap: 0;
    }

    .tab {
      padding: .9rem 1.2rem;
      cursor: pointer;
      font-size: .9rem;
      border-bottom: 2px solid transparent;
      color: #666;
    }

    .tab.active {
      border-bottom-color: #5865f2;
      color: #5865f2;
      font-weight: 600;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* エントリ一覧 */
    .entry-list { display: flex; flex-direction: column; gap: .75rem; }

    .entry-card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .entry-meta {
      font-size: .75rem;
      color: #888;
      margin-bottom: .35rem;
      display: flex;
      gap: .75rem;
    }

    .entry-title {
      font-size: 1rem;
      line-height: 1.4;
    }

    .entry-title a {
      color: #222;
      text-decoration: none;
    }

    .entry-title a:hover {
      text-decoration: underline;
    }

    .zebra-even { background: #ffffff; }
    .zebra-odd  { background: #e8f0fe; }

    .empty { color: #999; font-size: .9rem; text-align: center; padding: 2rem; }

    /* フィード管理 */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .add-form { display: flex; gap: .5rem; }

    .add-form input {
      flex: 1;
      min-width: 0;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      padding: .5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      white-space: nowrap;
    }

    .btn-add { background: #5865f2; color: #fff; }
    .btn-add:hover { background: #4752c4; }
    .btn-delete { background: #f0f0f0; color: #c00; }
    .btn-delete:hover { background: #fdd; }
    .btn-read { background: none; border: 1px solid #ccc; color: #888; font-size: .75rem; padding: .2rem .6rem; border-radius: 4px; }
    .btn-read:hover { background: #f0f0f0; }

    .source-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: .6rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .source-item:last-child { border-bottom: none; }

    .source-info { min-width: 0; }
    .source-domain { font-weight: 600; font-size: .9rem; }
    .source-url {
      font-size: .75rem;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error { color: #c00; font-size: .85rem; margin-top: .5rem; }

    @media (max-width: 480px) {
      header { gap: .75rem; }
      header h1 { font-size: 1rem; }
      .tab { padding: .9rem .75rem; font-size: .85rem; }
      .entry-title { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>starts</h1>
    <nav class="tabs">
      <div class="tab active" onclick="switchTab('entries')">新着</div>
      <div class="tab" onclick="switchTab('sources')">フィード管理</div>
    </nav>
  </header>

  <main>
    <!-- 新着一覧 -->
    <div id="page-entries" class="page active">
      <div id="entryList" class="entry-list"></div>
    </div>

    <!-- フィード管理 -->
    <div id="page-sources" class="page">
      <div class="card">
        <div class="add-form">
          <input id="urlInput" type="url" placeholder="https://example.com" />
          <button class="btn-add" onclick="addSource()">追加</button>
        </div>
        <div id="addError" class="error"></div>
      </div>
      <div class="card">
        <div id="sourceList"></div>
      </div>
    </div>
  </main>

  <script>
    const TOKEN = new URLSearchParams(location.search).get("token") ?? "";
    const BASE = location.pathname.replace(/\/$/, "");
    const api = (path) => `${BASE}${path}?token=${encodeURIComponent(TOKEN)}`;

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", ["entries", "sources"][i] === name);
      });
      document.querySelectorAll(".page").forEach(p => {
        p.classList.toggle("active", p.id === `page-${name}`);
      });
    }

    async function loadEntries() {
      const res = await fetch(api("/api/entries"));
      const entries = await res.json();
      const el = document.getElementById("entryList");

      if (entries.length === 0) {
        el.innerHTML = '<div class="empty">新着エントリはありません</div>';
        return;
      }

      const siteIndex = {};
      let siteCount = 0;
      el.innerHTML = entries.map(e => {
        const key = e.source_name ?? e.domain;
        if (!(key in siteIndex)) siteIndex[key] = siteCount++;
        const zebra = siteIndex[key] % 2 === 0 ? "zebra-even" : "zebra-odd";
        return `
        <div class="entry-card ${zebra}" id="entry-${e.id}">
          <div class="entry-meta">
            <span>${key}</span>
            <span>${e.created_at}</span>
            <button class="btn-read" onclick="markRead('${e.id}')">既読</button>
          </div>
          <div class="entry-title"><a href="${e.link}" target="_blank" rel="noopener">${e.title ?? "(タイトルなし)"}</a></div>
        </div>`;
      }).join("");
    }

    async function loadSources() {
      const res = await fetch(api("/api/sources"));
      const sources = await res.json();
      const el = document.getElementById("sourceList");

      if (sources.length === 0) {
        el.innerHTML = '<div class="empty">登録されているフィードはありません</div>';
        return;
      }

      el.innerHTML = sources.map(s => `
        <div class="source-item">
          <div class="source-info">
            <div class="source-domain">${s.name ?? s.domain}</div>
            <div class="source-url">${s.url}</div>
          </div>
          <button class="btn-delete" onclick="deleteSource('${s.url}')">削除</button>
        </div>
      `).join("");
    }

    async function addSource() {
      const input = document.getElementById("urlInput");
      const errEl = document.getElementById("addError");
      errEl.textContent = "";

      const url = input.value.trim();
      if (!url) return;
      const res = await fetch(api("/api/sources"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const data = await res.json();
        errEl.textContent = data.detail ?? "エラーが発生しました";
        return;
      }

      input.value = "";
      await Promise.all([loadSources(), loadEntries()]);
    }

    async function deleteSource(url) {
      if (!confirm(`削除しますか？\n${url}`)) return;
      await fetch(api("/api/sources"), {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      await Promise.all([loadSources(), loadEntries()]);
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addSource();
    });

    async function markRead(id) {
      await fetch(api(`/api/entries/${id}`), { method: "DELETE" });
      document.getElementById(`entry-${id}`).remove();
    }

    loadEntries();
    loadSources();
  </script>
</body>
</html>
