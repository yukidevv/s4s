<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>starts</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header h1 {
      font-size: 1.2rem;
      padding: 1rem 0;
    }

    .tabs {
      display: flex;
      gap: 0;
    }

    .tab {
      padding: .9rem 1.2rem;
      cursor: pointer;
      font-size: .9rem;
      border-bottom: 2px solid transparent;
      color: #666;
    }

    .tab.active {
      border-bottom-color: #5865f2;
      color: #5865f2;
      font-weight: 600;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* エントリ一覧 */
    .entry-list { display: flex; flex-direction: column; gap: .75rem; }

    .entry-card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .entry-meta {
      font-size: .75rem;
      color: #888;
      margin-bottom: .35rem;
      display: flex;
      gap: .75rem;
    }

    .entry-title {
      font-size: 1rem;
      line-height: 1.4;
    }

    .entry-title a {
      color: #222;
      text-decoration: none;
    }

    .entry-title a:hover {
      text-decoration: underline;
    }

    .zebra-even { background: #ffffff; }
    .zebra-odd  { background: #e8f0fe; }

    .empty { color: #999; font-size: .9rem; text-align: center; padding: 2rem; }

    /* フィード管理 */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .add-form { display: flex; gap: .5rem; }

    .add-form input {
      flex: 1;
      min-width: 0;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      padding: .5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      white-space: nowrap;
    }

    .btn-add { background: #5865f2; color: #fff; }
    .btn-add:hover { background: #4752c4; }
    .btn-delete { background: #f0f0f0; color: #c00; }
    .btn-delete:hover { background: #fdd; }
    .btn-read { background: none; border: 1px solid #ccc; color: #888; font-size: .75rem; padding: .2rem .6rem; border-radius: 4px; }
    .btn-read:hover { background: #f0f0f0; }
    .btn-save { background: none; border: 1px solid #5865f2; color: #5865f2; font-size: .75rem; padding: .2rem .6rem; border-radius: 4px; }
    .btn-save:hover { background: #eef0fd; }
    .btn-notify { background: #f0f0f0; color: #444; }
    .btn-notify:hover { background: #e0e0e0; }
    .btn-notify.active { background: #5865f2; color: #fff; }
    .btn-notify.active:hover { background: #4752c4; }

    .source-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: .6rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .source-item:last-child { border-bottom: none; }

    .source-info { min-width: 0; }
    .source-domain { font-weight: 600; font-size: .9rem; }
    .source-url {
      font-size: .75rem;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error { color: #c00; font-size: .85rem; margin-top: .5rem; }

    @media (max-width: 480px) {
      header { gap: .75rem; }
      header h1 { font-size: 1rem; }
      .tab { padding: .9rem .75rem; font-size: .85rem; }
      .entry-title { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>starts</h1>
    <nav class="tabs">
      <div class="tab active" onclick="switchTab('entries')">新着</div>
      <div class="tab" onclick="switchTab('saved')">後で読む</div>
      <div class="tab" onclick="switchTab('sources')">フィード管理</div>
    </nav>
    <button id="notifyBtn" class="btn-notify" onclick="toggleNotification()" style="margin-left:auto">通知OFF</button>
  </header>

  <main>
    <!-- 新着一覧 -->
    <div id="page-entries" class="page active">
      <div id="entryList" class="entry-list"></div>
    </div>

    <!-- 後で読む -->
    <div id="page-saved" class="page">
      <div id="savedList" class="entry-list"></div>
    </div>

    <!-- フィード管理 -->
    <div id="page-sources" class="page">
      <div class="card">
        <div class="add-form">
          <input id="urlInput" type="url" placeholder="https://example.com" />
          <button class="btn-add" onclick="addSource()">追加</button>
        </div>
        <div id="addError" class="error"></div>
      </div>
      <div class="card">
        <div id="sourceList"></div>
      </div>
    </div>
  </main>

  <script>
    const TOKEN = new URLSearchParams(location.search).get("token") ?? "";
    const BASE = location.pathname.replace(/\/$/, "");
    const api = (path) => `${BASE}${path}?token=${encodeURIComponent(TOKEN)}`;

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", ["entries", "saved", "sources"][i] === name);
      });
      document.querySelectorAll(".page").forEach(p => {
        p.classList.toggle("active", p.id === `page-${name}`);
      });
      location.hash = name;
      if (name === "entries") loadEntries();
      if (name === "saved") loadSaved();
      if (name === "sources") loadSources();
    }

    const initialTab = location.hash.replace("#", "") || "entries";
    switchTab(["entries", "saved", "sources"].includes(initialTab) ? initialTab : "entries");

    async function loadEntries() {
      const res = await fetch(api("/api/entries"));
      const entries = await res.json();
      const el = document.getElementById("entryList");

      if (entries.length === 0) {
        el.innerHTML = '<div class="empty">新着エントリはありません</div>';
        return;
      }

      const groups = [];
      const groupIndex = {};
      for (const e of entries) {
        const key = e.source_name ?? e.domain;
        if (!(key in groupIndex)) {
          groupIndex[key] = groups.length;
          groups.push({ key, entries: [] });
        }
        groups[groupIndex[key]].entries.push(e);
      }

      el.innerHTML = groups.flatMap((g, i) => {
        const zebra = i % 2 === 0 ? "zebra-even" : "zebra-odd";
        return g.entries.map(e => `
        <div class="entry-card ${zebra}" id="entry-${e.id}">
          <div class="entry-meta">
            <span>${g.key}</span>
            <span>${e.created_at}</span>
            <button class="btn-save" onclick="saveEntry('${e.id}')">後で読む</button>
            <button class="btn-read" onclick="markRead('${e.id}')">既読</button>
          </div>
          <div class="entry-title"><a href="${e.link}" target="_blank" rel="noopener">${e.title ?? "(タイトルなし)"}</a></div>
        </div>`);
      }).join("");
    }

    async function loadSources() {
      const res = await fetch(api("/api/sources"));
      const sources = await res.json();
      const el = document.getElementById("sourceList");

      if (sources.length === 0) {
        el.innerHTML = '<div class="empty">登録されているフィードはありません</div>';
        return;
      }

      el.innerHTML = sources.map(s => `
        <div class="source-item">
          <div class="source-info">
            <div class="source-domain">${s.name ?? s.domain}</div>
            <div class="source-url">${s.url}</div>
          </div>
          <button class="btn-delete" onclick="deleteSource('${s.url}')">削除</button>
        </div>
      `).join("");
    }

    async function addSource() {
      const input = document.getElementById("urlInput");
      const errEl = document.getElementById("addError");
      errEl.textContent = "";

      const url = input.value.trim();
      if (!url) return;
      const res = await fetch(api("/api/sources"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const data = await res.json();
        errEl.textContent = data.detail ?? "エラーが発生しました";
        return;
      }

      input.value = "";
      await Promise.all([loadSources(), loadEntries()]);
    }

    async function deleteSource(url) {
      if (!confirm(`削除しますか？\n${url}`)) return;
      await fetch(api("/api/sources"), {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      await Promise.all([loadSources(), loadEntries()]);
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addSource();
    });

    async function markRead(id) {
      await fetch(api(`/api/entries/${id}`), { method: "DELETE" });
      document.getElementById(`entry-${id}`).remove();
    }

    async function saveEntry(id) {
      await fetch(api(`/api/entries/${id}/save`), { method: "POST" });
      document.getElementById(`entry-${id}`).remove();
    }

    async function loadSaved() {
      const res = await fetch(api("/api/saved"));
      const entries = await res.json();
      const el = document.getElementById("savedList");

      if (entries.length === 0) {
        el.innerHTML = '<div class="empty">後で読む記事はありません</div>';
        return;
      }

      el.innerHTML = entries.map(e => {
        const key = e.source_name ?? e.domain;
        return `
        <div class="entry-card zebra-even" id="saved-${e.id}">
          <div class="entry-meta">
            <span>${key}</span>
            <span>${e.created_at}</span>
            <button class="btn-read" onclick="deleteSaved('${e.id}')">削除</button>
          </div>
          <div class="entry-title"><a href="${e.link}" target="_blank" rel="noopener">${e.title ?? "(タイトルなし)"}</a></div>
        </div>`;
      }).join("");
    }

    async function deleteSaved(id) {
      await fetch(api(`/api/saved/${id}`), { method: "DELETE" });
      document.getElementById(`saved-${id}`).remove();
    }

    // --- push通知 ---
    let swRegistration = null;
    let vapidPublicKey = null;

    async function initNotification() {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
      swRegistration = await navigator.serviceWorker.register("sw.js");
      const res = await fetch(api("/api/vapid-public-key"));
      if (res.ok) {
        const data = await res.json();
        vapidPublicKey = data.publicKey;
      }
      updateNotifyBtn();
    }

    async function updateNotifyBtn() {
      if (!swRegistration) return;
      const sub = await swRegistration.pushManager.getSubscription();
      const btn = document.getElementById("notifyBtn");
      btn.classList.toggle("active", !!sub);
      btn.textContent = sub ? "通知ON" : "通知OFF";
    }

    async function toggleNotification() {
      if (!swRegistration) return;
      const existing = await swRegistration.pushManager.getSubscription();
      if (existing) {
        await fetch(api("/api/push/subscribe"), {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint: existing.endpoint, p256dh: btoa(String.fromCharCode(...new Uint8Array(existing.getKey("p256dh")))), auth: btoa(String.fromCharCode(...new Uint8Array(existing.getKey("auth")))) }),
        });
        await existing.unsubscribe();
      } else {
        if (!vapidPublicKey) { alert("VAPID keys が設定されていません"); return; }
        const perm = await Notification.requestPermission();
        if (perm !== "granted") return;
        const sub = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
        });
        await fetch(api("/api/push/subscribe"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            endpoint: sub.endpoint,
            p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey("p256dh")))),
            auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey("auth")))),
          }),
        });
      }
      updateNotifyBtn();
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }
  </script>
</body>
</html>
